# Generated by scripts/render-clash-config.sh
proxy-providers:
  iKuuu:
    type: file
    path: "./providers/iKuuu_V2.yaml"
    payload: []
    interval: 43200
    health-check:
      enable: true
      lazy: true
      url: "https://www.gstatic.com/generate_204"
      interval: 600
  SakuraCat:
    type: file
    path: "./providers/SakuraCat.yaml"
    payload: []
    interval: 43200
    health-check:
      enable: true
      lazy: true
      url: "https://www.gstatic.com/generate_204"
      interval: 600
  CordCloud:
    type: file
    path: "./providers/CordCloud.yaml"
    payload: []
    interval: 43200
    health-check:
      enable: true
      lazy: true
      url: "https://www.gstatic.com/generate_204"
      interval: 600

proxy-groups:
  - name: 节点选择
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png
    type: select
    proxies: ['自动选择', '香港节点', '台湾节点', '狮城节点', '日本节点', '美国节点', '手动切换', '尊享节点', 'DIRECT']
  - name: 手动切换
    icon: https://fastly.jsdelivr.net/gh/shindgewongxj/WHATSINStash@master/icon/select.png
    include-all: true
    type: select
  - name: 自动选择
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png
    type: url-test
    use: ['SakuraCat', 'CordCloud']
    exclude-filter: '倍率:(2|1\.)|专线|专用|高级|高倍率|🇨🇳'
    interval: 300
    tolerance: 50
    proxies:
      - DIRECT
  - name: CUHK
    icon: https://cuhk.edu.hk/chinese/images/fav-icons/favicon-32x32.png
    type: select
    proxies: ['节点选择', '香港节点', '尊享节点', 'DIRECT']
  - name: 海外应用
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Google_Search.png
    type: select
    proxies: ['DIRECT', '节点选择', '美国节点', '香港节点', '台湾节点', '狮城节点', '日本节点', '手动切换']
  - name: 尊享节点
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/VIP.png
    type: select
    include-all: true
    exclude-filter: '🇨🇳'
    filter: '(专线|专用|高级|倍消耗)'
  - name: 全球直连
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Direct.png
    type: select
    proxies: ['DIRECT', '节点选择', '手动切换']
  - name: 广告拦截
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/AdBlack.png
    type: select
    proxies: ['REJECT', 'DIRECT']
  # - name: 应用净化
  #   icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hijacking.png
  #   type: select
  #   proxies: ['REJECT', 'DIRECT']
  - name: 漏网之鱼
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Final.png
    type: select
    proxies: ['节点选择', '自动选择', 'DIRECT', '香港节点', '台湾节点', '狮城节点', '日本节点', '美国节点', '手动切换']
  - name: 香港节点
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png
    include-all: true
    filter: (?i)港|HK|hk|Hong Kong|HongKong|hongkong
    # exclude-filter: '倍率:(2|1\.)'
    type: url-test
    interval: 300
    tolerance: 50
  - name: 日本节点
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png
    include-all: true
    filter: (?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan
    type: url-test
    interval: 300
    tolerance: 50
  - name: 美国节点
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png
    include-all: true
    filter: (?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States
    type: url-test
    interval: 300
    tolerance: 50
  - name: 台湾节点
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png
    include-all: true
    filter: (?i)台|新北|彰化|TW|Taiwan
    type: url-test
    interval: 300
    tolerance: 50
  - name: 狮城节点
    icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png
    include-all: true
    filter: (?i)新加坡|坡|狮城|SG|Singapore
    type: url-test
    interval: 300
    tolerance: 50
  # - name: 奈飞节点
  #   icon: https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Netflix.png
  #   include-all: true
  #   filter: (?i)NF|奈飞|解锁|Netflix|NETFLIX|Media
  #   type: select

